    <title>CD Color Scanner</title>

<body>
    <div id="app-container">
        <h1>CD Color Scanner</h1>
        <p>Point your camera at a colored CD, center it, and press Scan.</p>
        
        <div id="camera-container">
            <video id="video" playsinline autoplay></video>
            <canvas id="canvas"></canvas>
        </div>

        <div id="controls">
            <button id="scan-button">Scan</button>
            <button id="play-button" disabled>Play</button>
        </div>

        <div id="status">Please allow camera access.</div>
    </div>
